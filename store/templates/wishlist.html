<!DOCTYPE html>
<html>
    <head>
        <title>My Wishlist</title>
        <style>
            body { font-family: Arial; padding: 30px; background: #f5f5f5; }
            h1 { color: #c0392b; }
            .grid { display: flex; flex-wrap: wrap; gap: 20px; }
            .card { background: white; border-radius: 10px; 
                    padding: 20px; width: 200px; text-align: center;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
            .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }
            .btn-remove { background: #c0392b; color: white; padding: 8px 16px;
                          text-decoration: none; border-radius: 5px;
                          display: inline-block; margin-top: 10px; }
            .btn-home { background: #27ae60; color: white; padding: 10px 20px;
                        text-decoration: none; border-radius: 5px;
                        display: inline-block; margin-bottom: 20px; }
        </style>
    </head>
    <body>
        </h1>❤️My wishlist</h1>
        <a href="/" class="btn-home">← Back to Shop</a>
        {% if items %}
        <div class="grid">
            {% for item in items %}
            <div class="card">
                {% if item.product.image %}
                <img src="{{ item.product.image.url }}" alt="{{ item.product.name }}">
                {% endif %}
                <h3>{{ item.product.name }}</h3>
                <p>₹{{ item.product.price }}</p>
                <a href="/add-to-cart/{{ item.product.pkn}}/"
                   style="background:#27ae60; color:white; padding:6px 12px;
                          text-decoration:none; border-radius:5px;">
                   🛒 Add to Cart 
                </a>
                <a href="/wishlist/remove/{{ item.product.pk }}/" class="btn-remove">
                   ❌Remove
                </a>
            </div>
            {% endfor %}
        </div>
        {% else %}
            <p>Your wishlist is empty. <a href="/">Shop Now!</a></p>
        {% endif %}
</body>
</html>
