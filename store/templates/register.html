<!DOCTYPE html>
<html>
    <head>
        <title>Register -ShopCorner</title>
        <style>
            body { font-family: Arial; backgroun: #f5f5f5; display: flex; justify-content: center; padding-top: 50px; }
            .box { background: white; padding: 40px; border-radius: 10px; width: 400px; }
            h1 { color: #c0392b; text-align:center; }
            input { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 5px; }
            button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 5px; margin-top: 15px; font-size: 16px; cursor: pointer; }
            a { color: #c0392b; }
            p { text-align: center; margin-top: 15px; }
        </style>
    <head>
    <body>
        <div class="box">
            <h1>📝Register</h1>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Create Account</button>
            </form>
            <p>Already have account? <a href="/login">Login here</a></p>
            <p><a href="/">← Back to shop</a></p>
        </div>
    </body>
</html>
