<!DOCTYPE html>
<html>
    <head>
        <title>Login - ShopCorner</title>
        <style>
            body {font-family: Arial; background: #f5f5f5; display:flex; justify-content: center; padding-top: 80px; }
            .box { background: white; padding: 40px; border-radius: 10px; width: 400px; }
            h1 { color: #c0392b; text-align: center; }
            input { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 5px; }
            button { width: 100%; padding: 12px; background: #c0392b; color: white; border: none; border-radius: 5px; margin-top: 15px; font-size: 16px; cursor: pointer; }
            a { color: #c0392b; }
            p { text-align: center; margin-top: 15px; }
        </style>
    </head>
    <body>
        <div class="box">
            <h1>🔐 Login</h1>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Login</button>
            </form>
            <p>No account? <a href="/register/">Register here</a></p>
            <p><a href="/">← Back to shop</a><p>
        </div>
    </body>
</html>
