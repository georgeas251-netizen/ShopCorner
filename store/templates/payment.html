<!DOCTYPE html>
<html>
    <head>
        <title>Payment</title>
        <style>
            body { font-family: Arial; text-align: center; padding: 50px; background: #f5f5f5; }
            .box { background: white; padding: 40px; border-radius: 10px;
                   max-width: 500px; margin: auto;
                   box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
            h1 { color: #c0392b; }
            .amount { font-size: 32px; color: #27ae60; font-weight: bold; margin: 20px 0; }
            .btn { background: #27ae60; color: white; padding: 15px 40px;
                   border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
        </style>
    </head>
    <body>
        <div class="box">
            <h1>💳 Complete Payment</h1>
            <p>Order #{{ order.pk }}</p>
            <p>Delivering to: <strong>{{ order.full_name }}</strong></p>
            <div class="amount">₹{{ order.total_price }}</div>

            <button class="btn" onclick="payNow()">Pay Now 🔒</button>

        </div>

        <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
        <script>
            function payNow() {
                var options = {
                    "key": "{{ razorpay_key_id }}",
                    "amount": "{{ amount }}",
                    "currency": "INR",
                    "name": "ShopCorner",
                    "description": "Order #{{ order.pk }}",
                    "order_id": "{{ razorpay_order_id }}",
                    "handler": function(response) {
                        window.location.href = "/payment-success/";
                    },
                    "prefill": {
                        "name": "{{ order.full_name }}",
                        "color": "{{ order.phone }}"
                    },
                    "theme": {
                        "color": "#c0392b"
                    }
                };
                var rzp = new Razorpay(options);
                rzp.open();
            }
        </script>
